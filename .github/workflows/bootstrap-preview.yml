name: Bootstrap preview from Ttest

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: bootstrap-preview
  cancel-in-progress: false

jobs:
  import-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout preview repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Import Ttest source into main
        if: ${{ hashFiles('.preview-source-imported') == '' }}
        shell: bash
        run: |
          set -euo pipefail

          git clone --depth 1 \
            --branch feature/idealista-freehand-map-parity \
            https://github.com/antony502189-max/Ttest.git \
            /tmp/tpreview-source

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a --exclude='.git' /tmp/tpreview-source/ ./

          # The preview repository has its own deployment workflow.
          rm -rf .github/workflows
          mkdir -p .github/workflows

          cat > .github/workflows/deploy-pages.yml <<'WORKFLOW'
          name: Deploy preview to GitHub Pages

          on:
            push:
              branches: [main]
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: pages
            cancel-in-progress: true

          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v6

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm

                - name: Install dependencies
                  run: |
                    if [ -f package-lock.json ]; then
                      npm ci
                    else
                      npm install
                    fi

                - name: Build preview
                  run: npm run build
                  env:
                    VITE_BASE_PATH: /teat22/
                    VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
                    VITE_GOOGLE_MAPS_MAP_ID: ${{ secrets.VITE_GOOGLE_MAPS_MAP_ID }}

                - name: Configure Pages
                  uses: actions/configure-pages@v5

                - name: Upload Pages artifact
                  uses: actions/upload-pages-artifact@v4
                  with:
                    path: ./dist

            deploy:
              needs: build
              runs-on: ubuntu-latest
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              steps:
                - name: Deploy to GitHub Pages
                  id: deployment
                  uses: actions/deploy-pages@v4
          WORKFLOW

          touch .preview-source-imported

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: import Ttest preview source"
          git push origin HEAD:main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build imported preview
        run: npm run build
        env:
          VITE_BASE_PATH: /teat22/
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_MAP_ID: ${{ secrets.VITE_GOOGLE_MAPS_MAP_ID }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
