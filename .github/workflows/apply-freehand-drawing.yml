name: Apply freehand drawing implementation

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-freehand-drawing.yml

permissions:
  contents: write

concurrency:
  group: apply-freehand-drawing
  cancel-in-progress: false

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Write implementation and tests
        shell: python
        run: |
          import base64, gzip
          from pathlib import Path

          files = {
            'src/components/map/results-map.tsx': '',
            'tests/freehand-map-drawing.spec.ts': ''
          }
          for filename, payload in files.items():
            path = Path(filename)
            path.parent.mkdir(parents=True, exist_ok=True)
            path.write_bytes(gzip.decompress(base64.b64decode(payload)))

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: |
          npm run lint
          npm run typecheck
          npm run build
        env:
          VITE_BASE_PATH: /teat22/
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_MAPS_MAP_ID: ${{ secrets.VITE_GOOGLE_MAPS_MAP_ID }}

      - name: Commit implementation
        run: |
          rm .github/workflows/apply-freehand-drawing.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/map/results-map.tsx tests/freehand-map-drawing.spec.ts .github/workflows/apply-freehand-drawing.yml
          git commit -m "feat: add freehand map drawing"
          git push origin HEAD:main
